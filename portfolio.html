<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio ของฉัน 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Trebuchet MS',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffd6e7,#ffe4f3,#f7ddff);
    text-align:center;
}

.container{
    max-width:850px;
    margin:auto;
    padding:40px 20px;
}

h1{
    color:#ff4f9a;
    font-size:55px;
    margin-bottom:20px;
}

/* รูปโปรไฟล์วงกลม */
.profile-img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:6px solid white;
    box-shadow:0 8px 20px rgba(255,105,180,.3);
    margin-bottom:25px;
}

.subtitle{
    color:#8b5f82;
    font-size:18px;
    margin-bottom:40px;
}

.project-card{
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
    margin:25px 0;
    text-align:left;
    box-shadow:0 10px 25px rgba(255,105,180,.2);
    transition:.3s;
}

.project-card:hover{
    transform:translateY(-8px);
}

.project-card h3{
    color:#ff4f9a;
    margin-bottom:15px;
}

.project-card p{
    color:#666;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:16px 35px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(45deg,#ff8bb8,#ff5fa2);
    box-shadow:0 8px 20px rgba(255,105,180,.4);
}
</style>
</head>

<body>

<div class="container">

    <h1>🌷 Portfolio 🌷</h1>

    <!-- รูปของตัวเอง -->
    <img src="IMG_0005.jpeg" alt="Profile" class="profile-img">

    <p class="subtitle">
        นี่คือพื้นที่รวบรวมผลงานและกิจกรรมที่ภาคภูมิใจของฉัน ✨
    </p>

    <div class="project-card">
        <h3>💻 1. โครงงานวิทยาศาสตร์คำนวณ</h3>
        <p>
            เขียนอธิบายรายละเอียดของโครงงานที่ทำ และสิ่งที่ได้เรียนรู้จากการทำงานชิ้นนี้
        </p>
    </div>

    <div class="project-card">
        <h3>🏆 2. กิจกรรมและเกียรติบัตรที่ได้รับ</h3>
        <p>
            รวบรวมกิจกรรม การแข่งขัน และเกียรติบัตรต่าง ๆ ที่เคยได้รับ
        </p>
    </div>

    <a href="index.html" class="btn">
        🔙 กลับหน้าแรก
    </a>

</div>

</body>
</html>
