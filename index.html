  <!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Pink Popup</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:'Arial',sans-serif;

}

body{

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    overflow:hidden;

    background:linear-gradient(135deg,#ffd6e7,#ffe8f3,#fff5fa);

}

/* วงกลมตกแต่ง */

body::before{

    content:"";

    position:absolute;

    width:300px;

    height:300px;

    background:rgba(255,255,255,.4);

    border-radius:50%;

    top:-100px;

    left:-100px;

}

body::after{

    content:"";

    position:absolute;

    width:250px;

    height:250px;

    background:rgba(255,255,255,.4);

    border-radius:50%;

    bottom:-80px;

    right:-80px;

}

/* ปุ่ม */

.btn{

    padding:18px 40px;

    border:none;

    border-radius:50px;

    background:linear-gradient(45deg,#ff7eb3,#ff4d94);

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:0 10px 25px rgba(255,105,180,.5);

    transition:.3s;

}

.btn:hover{

    transform:translateY(-5px);

}

/* พื้นหลัง Popup */

.modal{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(255,182,193,.4);

    backdrop-filter:blur(8px);

}

/* กล่อง Popup */

.modal-content{

    width:360px;

    background:white;

    border-radius:30px;

    padding:30px;

    margin:8% auto;

    text-align:center;

    box-shadow:0 15px 40px rgba(255,105,180,.3);

    animation:popup .5s;

}

@keyframes popup{

    from{

        transform:scale(.5);

        opacity:0;

    }

    to{

        transform:scale(1);

        opacity:1;

    }

}

.modal-content h2{

    color:#ff4d94;

    margin-top:15px;

}

.modal-content p{

    color:#777;

    margin:15px 0;

}

/* รูป GIF */

.gif{

    width:160px;

    border-radius:20px;

}

/* ปุ่มใน popup */

.popup-btn{

    border:none;

    padding:12px 25px;

    margin:8px;

    border-radius:20px;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;

}

.confirm{

    background:linear-gradient(45deg,#ff7eb3,#ff4d94);

}

.cancel{

    background:linear-gradient(45deg,#ffb6c1,#ff8fab);

}

.popup-btn:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<button class="btn" onclick="openModal()">

💖 Next Page

</button>

<div class="modal" id="myModal">

<div class="modal-content">

<img class="gif"

src="https://media.tenor.com/1kQ7Y2G6l7YAAAAi/my-melody.gif">

<h2>🌷 ไปหน้าถัดไปไหม?</h2>

<p>กด "ตกลง" เพื่อเปิด Portfolio ✨</p>

<button class="popup-btn confirm" onclick="goNext()">

🎀 ตกลง

</button>

<button class="popup-btn cancel" onclick="closeModal()">

💗 ยกเลิก

</button>

</div>

</div>

<script>

function openModal(){

    document.getElementById("myModal").style.display="block";

}

function closeModal(){

    document.getElementById("myModal").style.display="none";

}

function goNext(){

    window.location.href="portfolio.html";

}

</script>

</body>

</html>
